<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>こっこちゃんはどこ？ | こっこちゃん</title>
<link rel="stylesheet" href="../_shared/style.css">
<style>
#stage { padding: 0; }
#field {
  position: absolute; inset: 0;
  overflow: hidden;
}
.item {
  position: absolute;
  font-size: 2em;
  cursor: pointer;
  transform: translate(-50%, -50%);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.item:active { transform: translate(-50%, -50%) scale(1.3); }
.item.kokko {
  width: var(--ksize, 50px);
  height: auto;
}
.item.kokko img {
  width: 100%;
  height: auto;
  display: block;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}
.item.found {
  animation: found 1s forwards;
  z-index: 100;
}
@keyframes found {
  0%   { transform: translate(-50%,-50%) scale(1); }
  30%  { transform: translate(-50%,-50%) scale(2) rotate(360deg); }
  100% { transform: translate(-50%,-50%) scale(0) rotate(720deg); opacity: 0; }
}
.hint {
  position: absolute;
  top: 8px; left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border: 2px solid #ff7043;
  border-radius: 14px;
  padding: 6px 14px;
  font-size: 0.85em;
  font-weight: bold;
  color: #e64a19;
  box-shadow: 0 3px 0 #ffb27a;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 6px;
}
.hint img { width: 32px; height: auto; vertical-align: middle; }
.ripple {
  position: absolute;
  width: 30px; height: 30px;
  border: 3px solid #f44336;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%,-50%);
  animation: ripple 0.6s forwards;
}
@keyframes ripple {
  0% { width: 10px; height: 10px; opacity: 1; }
  100% { width: 80px; height: 80px; opacity: 0; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <a href="../../" class="back">← もどる</a>
    <h1>👀 こっこちゃんはどこ？</h1>
    <div class="hud">レベル: <b id="lvl">1</b><br>たいむ: <b id="time">30</b></div>
  </header>
  <div id="message">この子を 見つけてね！</div>
  <div id="stage">
    <div class="hint">さがすのは：<img src="../number-collect/assets/kokko.png" alt="こっこちゃん"></div>
    <div id="field"></div>
  </div>
</div>
<div id="overlay" class="hidden"><div class="card">
  <h2 id="overTitle">クリア！</h2>
  <p id="overText"></p>
  <button id="overBtn" class="big">つぎへ</button>
</div></div>
<script src="../_shared/sound.js"></script>
<script>
const DECOYS = ['🐔','🐤','🐣','🐦','🐧','🦆','🦢','🦅','🦉','🦜','🐓','🐰','🐱','🐶','🐻','🐼','🐨','🦊','🐯','🦁','🐮','🐷','🐭','🐹','🐸','🐵','🦒','🦓','🦄','🐴'];
const $ = id => document.getElementById(id);

let lvl = 1, timeLeft = 30, timer = null, gameOver = false;

// パーセンテージ座標で配置（レイアウトに依存しない）
function rndPct() {
  return {
    x: 6 + Math.random() * 88,   // 6%〜94%
    y: 18 + Math.random() * 76,  // 18%〜94%（上部のヒント領域を避ける）
  };
}

function gen() {
  const field = $('field');
  field.innerHTML = '';
  const num = 25 + lvl * 12;
  const ksize = Math.max(35, 65 - lvl * 4);

  // ダミー
  for (let i = 0; i < num; i++) {
    const e = document.createElement('div');
    e.className = 'item';
    e.textContent = DECOYS[Math.floor(Math.random() * DECOYS.length)];
    e.style.fontSize = (1.5 + Math.random() * 0.8) + 'em';
    const p = rndPct();
    e.style.left = p.x + '%';
    e.style.top  = p.y + '%';
    e.addEventListener('click', (ev) => {
      if (gameOver) return;
      KokkoSound.wrong();
      timeLeft = Math.max(0, timeLeft - 2);
      $('time').textContent = timeLeft;
      const fr = field.getBoundingClientRect();
      ripple(ev.clientX - fr.left, ev.clientY - fr.top, field);
    });
    field.appendChild(e);
  }

  // 本物のこっこちゃん
  const k = document.createElement('div');
  k.className = 'item kokko';
  k.style.setProperty('--ksize', ksize + 'px');
  k.innerHTML = '<img src="../number-collect/assets/kokko.png" alt="こっこちゃん">';
  const p = rndPct();
  k.style.left = p.x + '%';
  k.style.top  = p.y + '%';
  k.addEventListener('click', () => found(k));
  field.appendChild(k);
}

function ripple(x, y, parent) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  parent.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

function found(k) {
  if (gameOver) return;
  gameOver = true;
  KokkoSound.clear();
  k.classList.add('found');
  clearInterval(timer);
  setTimeout(() => {
    $('overTitle').textContent = 'みつけた！🎉';
    $('overText').textContent = `のこり ${timeLeft}秒  /  レベル ${lvl}`;
    $('overlay').classList.remove('hidden');
  }, 800);
}

function start() {
  gameOver = false;
  timeLeft = Math.max(15, 35 - lvl * 2);
  $('time').textContent = timeLeft;
  $('lvl').textContent = lvl;
  $('message').textContent = 'こっこちゃんを 見つけて タップ！';
  gen();
  timer = setInterval(() => {
    if (gameOver) return;
    timeLeft--;
    $('time').textContent = timeLeft;
    if (timeLeft <= 0) {
      gameOver = true;
      clearInterval(timer);
      KokkoSound.over();
      $('overTitle').textContent = 'じかん切れ';
      $('overText').textContent = 'もう一回 ちょうせん！';
      $('overlay').classList.remove('hidden');
    }
  }, 1000);
}

$('overBtn').onclick = () => {
  if ($('overTitle').textContent === 'じかん切れ') lvl = 1;
  else lvl++;
  $('overlay').classList.add('hidden');
  start();
};

setTimeout(start, 200);
window.addEventListener('resize', () => { if (!gameOver) gen(); });
</script>
</body>
</html>
