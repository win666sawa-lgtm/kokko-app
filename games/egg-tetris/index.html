<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>たまごテトリス | こっこちゃん</title>
<link rel="stylesheet" href="../_shared/style.css">
<style>
canvas { display: block; margin: 0 auto; background: #fff5e6; border-radius: 12px; box-shadow: inset 0 0 0 4px #ffb27a; touch-action: none; }
.touch { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 8px; }
.touch button { padding: 14px 0; font-size: 1.4em; background: #ff7043; color:#fff; border:none; border-radius: 12px; box-shadow: 0 4px 0 #c63d0c; font-weight: bold; }
.touch button:active { transform: translateY(2px); box-shadow: 0 2px 0 #c63d0c; }
</style>
</head>
<body>
<div id="app">
  <header>
    <a href="../../" class="back">← もどる</a>
    <h1>🥚 たまごテトリス</h1>
    <div class="hud">てん: <b id="score">0</b><br>レベル: <b id="lvl">1</b></div>
  </header>
  <div id="message">同じ色の たまごを 3つ そろえよう！</div>
  <div id="stage" style="display:flex;align-items:center;justify-content:center;">
    <canvas id="cv" width="240" height="480"></canvas>
  </div>
  <div class="touch">
    <button id="bL">◀</button>
    <button id="bD">▼</button>
    <button id="bR">▶</button>
  </div>
</div>
<div id="overlay" class="hidden"><div class="card">
  <h2>ゲームオーバー</h2><p id="overText"></p>
  <button id="overBtn" class="big">もういちど</button>
</div></div>
<script src="../_shared/sound.js"></script>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const COLS=6,ROWS=12,CELL=40;
const COLORS=['#ff7043','#ffca28','#66bb6a','#42a5f5','#ab47bc','#ec407a'];
let grid,cur,score,lvl,fall,timer,gameOver;
const $=id=>document.getElementById(id);

function reset(){
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(-1));
  score=0;lvl=1;fall=600;gameOver=false;
  $('score').textContent=0;$('lvl').textContent=1;
  spawn();
}
function spawn(){
  cur={x:Math.floor(COLS/2)-1,y:0,
       a:Math.floor(Math.random()*COLORS.length),
       b:Math.floor(Math.random()*COLORS.length)};
  if(grid[0][cur.x]>=0||grid[0][cur.x+1]>=0){
    gameOver=true;clearInterval(timer);KokkoSound.over();
    $('overText').textContent=`てんすう: ${score}`;
    $('overlay').classList.remove('hidden');
  }
}
function draw(){
  ctx.fillStyle='#fff5e6';ctx.fillRect(0,0,cv.width,cv.height);
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(grid[y][x]>=0)egg(x,y,grid[y][x]);
  }
  if(cur){egg(cur.x,cur.y,cur.a);egg(cur.x+1,cur.y,cur.b);}
}
function egg(x,y,c){
  const cx=x*CELL+CELL/2,cy=y*CELL+CELL/2;
  ctx.fillStyle=COLORS[c];
  ctx.beginPath();
  ctx.ellipse(cx,cy,CELL/2-3,CELL/2-1,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(cx-6,cy-8,4,6,0,0,Math.PI*2);
  ctx.fill();
}
function canMove(dx,dy){
  const nx=cur.x+dx,ny=cur.y+dy;
  if(nx<0||nx+1>=COLS+1||ny>=ROWS)return false;
  if(nx<0||nx+1>COLS)return false;
  if(grid[ny]&&(grid[ny][nx]>=0||grid[ny][nx+1]>=0))return false;
  return true;
}
function lock(){
  grid[cur.y][cur.x]=cur.a;
  grid[cur.y][cur.x+1]=cur.b;
  // 重力で個別に落下
  applyGravity();
  // マッチ消し
  while(checkMatches()){applyGravity();}
  spawn();
}
function applyGravity(){
  for(let x=0;x<COLS;x++){
    let stack=[];
    for(let y=ROWS-1;y>=0;y--)if(grid[y][x]>=0){stack.push(grid[y][x]);grid[y][x]=-1;}
    let y=ROWS-1;
    for(const v of stack){grid[y][x]=v;y--;}
  }
}
function checkMatches(){
  const mark=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  let found=false;
  // 横
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS-2;x++){
    const c=grid[y][x];if(c<0)continue;
    if(grid[y][x+1]===c&&grid[y][x+2]===c){
      mark[y][x]=mark[y][x+1]=mark[y][x+2]=true;found=true;
    }
  }
  // 縦
  for(let x=0;x<COLS;x++)for(let y=0;y<ROWS-2;y++){
    const c=grid[y][x];if(c<0)continue;
    if(grid[y+1][x]===c&&grid[y+2][x]===c){
      mark[y][x]=mark[y+1][x]=mark[y+2][x]=true;found=true;
    }
  }
  if(found){
    KokkoSound.pop();
    let cnt=0;
    for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(mark[y][x]){grid[y][x]=-1;cnt++;}
    score+=cnt*10;$('score').textContent=score;
    if(score>=lvl*100){lvl++;$('lvl').textContent=lvl;fall=Math.max(150,fall-80);clearInterval(timer);timer=setInterval(tick,fall);}
  }
  return found;
}
function tick(){
  if(gameOver)return;
  if(canMove(0,1)){cur.y++;}else{lock();}
  draw();
}
function move(dx){if(canMove(dx,0)){cur.x+=dx;draw();}}
function drop(){while(canMove(0,1))cur.y++;lock();draw();}
document.addEventListener('keydown',e=>{
  if(gameOver)return;
  if(e.key==='ArrowLeft')move(-1);
  else if(e.key==='ArrowRight')move(1);
  else if(e.key==='ArrowDown')drop();
});
$('bL').onclick=()=>move(-1);
$('bR').onclick=()=>move(1);
$('bD').onclick=drop;
$('overBtn').onclick=()=>{$('overlay').classList.add('hidden');reset();timer=setInterval(tick,fall);};
reset();timer=setInterval(tick,fall);draw();
</script>
</body>
</html>
