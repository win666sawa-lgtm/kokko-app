<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>こっこちゃんはどこ？ | こっこちゃん</title>
<link rel="stylesheet" href="../_shared/style.css">
<style>
#field { position: absolute; inset: 0; }
.item {
  position: absolute; font-size: 2em; cursor: pointer;
  transform: translate(-50%,-50%);
  transition: transform 0.1s;
}
.item:active { transform: translate(-50%,-50%) scale(1.3); }
.item.found { animation: found 0.6s; }
@keyframes found {
  0%   { transform: translate(-50%,-50%) scale(1); }
  50%  { transform: translate(-50%,-50%) scale(2) rotate(360deg); }
  100% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <a href="../../" class="back">← もどる</a>
    <h1>👀 こっこちゃんはどこ？</h1>
    <div class="hud">レベル: <b id="lvl">1</b><br>たいむ: <b id="time">30</b></div>
  </header>
  <div id="message">こっこちゃんを 見つけて タップ！</div>
  <div id="stage"><div id="field"></div></div>
</div>
<div id="overlay" class="hidden"><div class="card">
  <h2 id="overTitle">クリア！</h2><p id="overText"></p>
  <button id="overBtn" class="big">つぎへ</button>
</div></div>
<script src="../_shared/sound.js"></script>
<script>
const DECOYS=['🐔','🐤','🐣','🦆','🐦','🦜','🐧','🦢','🐓','🦉'];
const KOKKO='👧'; // こっこちゃん（女の子絵文字）
let lvl=1, timeLeft=30, timer, gameOver;
const $=id=>document.getElementById(id);

function gen(){
  const field=$('field');
  field.innerHTML='';
  const rect=$('stage').getBoundingClientRect();
  const num=20+lvl*10;
  // ダミー
  for(let i=0;i<num;i++){
    const e=document.createElement('div');
    e.className='item';
    e.textContent=DECOYS[Math.floor(Math.random()*DECOYS.length)];
    e.style.left=(20+Math.random()*(rect.width-40))+'px';
    e.style.top=(20+Math.random()*(rect.height-40))+'px';
    e.onclick=()=>{KokkoSound.wrong();timeLeft=Math.max(0,timeLeft-3);$('time').textContent=timeLeft;};
    field.appendChild(e);
  }
  // 本物
  const k=document.createElement('div');
  k.className='item';k.textContent=KOKKO;
  k.style.left=(20+Math.random()*(rect.width-40))+'px';
  k.style.top=(20+Math.random()*(rect.height-40))+'px';
  k.onclick=()=>found(k);
  field.appendChild(k);
}
function found(k){
  KokkoSound.clear();
  k.classList.add('found');
  clearInterval(timer);
  $('overTitle').textContent='みつけた！🎉';
  $('overText').textContent=`のこり ${timeLeft}秒  /  レベル ${lvl}`;
  setTimeout(()=>$('overlay').classList.remove('hidden'),700);
}
function start(){
  timeLeft=Math.max(15,30-lvl*2);$('time').textContent=timeLeft;$('lvl').textContent=lvl;
  gen();
  timer=setInterval(()=>{
    timeLeft--;$('time').textContent=timeLeft;
    if(timeLeft<=0){
      clearInterval(timer);KokkoSound.over();
      $('overTitle').textContent='じかん切れ';
      $('overText').textContent=`もう一回チャレンジ！`;
      $('overlay').classList.remove('hidden');
    }
  },1000);
}
$('overBtn').onclick=()=>{
  if($('overTitle').textContent==='じかん切れ')lvl=1;else lvl++;
  $('overlay').classList.add('hidden');start();
};
setTimeout(start,300);
</script>
</body>
</html>
