<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>はこの中のこっこちゃん | こっこちゃん</title>
<link rel="stylesheet" href="../_shared/style.css">
<style>
#stage { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; }

.boxes-wrap {
  position: relative;
  width: 100%;
  max-width: 420px;
  height: 220px;
  margin: 12px auto;
}

.slot {
  position: absolute;
  width: 110px;
  height: 130px;
  bottom: 30px;
  transition: left 0.4s ease-in-out;
  cursor: pointer;
}

.box-img {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg,#ff7043 0%,#e64a19 100%);
  border-radius: 10px 10px 14px 14px;
  box-shadow: 0 6px 0 #c63d0c, inset 0 -10px 0 rgba(0,0,0,0.2);
  transition: transform 0.5s ease;
}
.box-img::before {
  content: '?';
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%,-50%);
  font-size: 3em;
  color: #fff;
  font-weight: bold;
  text-shadow: 0 3px 0 rgba(0,0,0,0.3);
}

.kokko-inside {
  position: absolute;
  bottom: 8px; left: 50%;
  transform: translateX(-50%);
  width: 70px;
  opacity: 0;
  transition: opacity 0.3s 0.3s;
}
.kokko-inside img { width: 100%; display: block; }

.slot.lifted .box-img { transform: translateY(-90px); }
.slot.lifted .kokko-inside { opacity: 1; }

.shadow {
  position: absolute;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  width: 90px; height: 8px;
  background: rgba(0,0,0,0.2);
  border-radius: 50%;
  pointer-events: none;
}

.start-btn {
  display: block; margin: 8px auto;
  padding: 14px 32px;
  font-size: 1.2em; background: #ff7043; color: #fff;
  border: none; border-radius: 16px;
  box-shadow: 0 5px 0 #c63d0c; font-weight: bold;
  cursor: pointer;
  touch-action: manipulation;
}
.start-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #c63d0c; }
.start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">
  <header>
    <a href="../../" class="back">← もどる</a>
    <h1>📦 はこの中のこっこちゃん</h1>
    <div class="hud">れんしょう: <b id="streak">0</b></div>
  </header>
  <div id="message">こっこちゃんを よく見ててね！</div>
  <div id="stage">
    <div class="boxes-wrap" id="boxesWrap">
      <div class="slot" data-i="0">
        <div class="kokko-inside"><img src="../number-collect/assets/kokko.png" alt="こっこちゃん"></div>
        <div class="box-img"></div>
        <div class="shadow"></div>
      </div>
      <div class="slot" data-i="1">
        <div class="kokko-inside"><img src="../number-collect/assets/kokko.png" alt="こっこちゃん"></div>
        <div class="box-img"></div>
        <div class="shadow"></div>
      </div>
      <div class="slot" data-i="2">
        <div class="kokko-inside"><img src="../number-collect/assets/kokko.png" alt="こっこちゃん"></div>
        <div class="box-img"></div>
        <div class="shadow"></div>
      </div>
    </div>
    <button class="start-btn" id="startBtn">▶ シャッフル！</button>
  </div>
</div>

<script src="../_shared/sound.js"></script>
<script>
const slots = Array.from(document.querySelectorAll('.slot'));
const $ = id => document.getElementById(id);

// positions[slot_id] = current visual position (0=left, 1=center, 2=right)
let positions = [0, 1, 2];
let kokkoSlot = 0;  // どのスロットにこっこちゃんがいるか
let streak = 0;
let phase = 'ready'; // ready / showing / shuffling / waiting / revealed

const POS_X = [10, 155, 300]; // 各位置の left 値（boxes-wrap内）

function layoutSlots() {
  slots.forEach(s => {
    const i = parseInt(s.dataset.i, 10);
    s.style.left = POS_X[positions[i]] + 'px';
  });
}

function setMessage(text) { $('message').textContent = text; }

function showAll() {
  slots.forEach((s, i) => {
    const insideKokko = s.querySelector('.kokko-inside');
    insideKokko.style.display = (i === kokkoSlot) ? 'block' : 'none';
    s.classList.add('lifted');
  });
}

function hideAll() {
  slots.forEach(s => s.classList.remove('lifted'));
}

function reveal() {
  // すべて持ち上げる（こっこちゃんがどこにいるか見せる）
  slots.forEach((s, i) => {
    const insideKokko = s.querySelector('.kokko-inside');
    insideKokko.style.display = (i === kokkoSlot) ? 'block' : 'none';
    s.classList.add('lifted');
  });
}

function newRound() {
  phase = 'showing';
  $('startBtn').disabled = true;
  $('startBtn').textContent = '見ててね...';
  // ランダムにこっこちゃんを配置
  kokkoSlot = Math.floor(Math.random() * 3);
  positions = [0, 1, 2];
  layoutSlots();
  showAll();
  setMessage('こっこちゃんは ここ！ よく見て！');

  setTimeout(() => {
    hideAll();
    setMessage('シャッフル中...');
    setTimeout(shuffle, 600);
  }, 1800);
}

function swapPositions(a, b) {
  // a と b の visual position を入れ替え
  // positions配列はslot_id→pos、なのでpositionの値がa,bのslotを探す
  let slotA = -1, slotB = -1;
  for (let i = 0; i < 3; i++) {
    if (positions[i] === a) slotA = i;
    else if (positions[i] === b) slotB = i;
  }
  if (slotA < 0 || slotB < 0) return;
  positions[slotA] = b;
  positions[slotB] = a;
  layoutSlots();
}

function shuffle() {
  phase = 'shuffling';
  let cnt = 0;
  const max = 5 + streak * 2;

  function step() {
    if (cnt >= max) {
      phase = 'waiting';
      $('startBtn').textContent = '▶ シャッフル！';
      setMessage('こっこちゃんは どこ？ タップ！');
      return;
    }
    cnt++;
    KokkoSound.pop();
    // ランダムに2つの隣接位置を選ぶ（コリジョンしない）
    const a = Math.floor(Math.random() * 2); // 0 or 1
    const b = a + 1; // 1 or 2
    swapPositions(a, b);
    setTimeout(step, 500);
  }
  step();
}

slots.forEach(s => s.addEventListener('click', () => {
  if (phase !== 'waiting') return;
  phase = 'revealed';
  const i = parseInt(s.dataset.i, 10);
  reveal();
  if (i === kokkoSlot) {
    KokkoSound.clear();
    streak++;
    $('streak').textContent = streak;
    setMessage('せいかい！🎉  もう一回？');
  } else {
    KokkoSound.over();
    streak = 0;
    $('streak').textContent = 0;
    setMessage('ざんねん…正解はあのはこ！');
  }
  $('startBtn').disabled = false;
}));

$('startBtn').addEventListener('click', () => {
  if (phase === 'shuffling' || phase === 'showing') return;
  newRound();
});

// 初期化
layoutSlots();
showAll();
setMessage('「シャッフル！」を押してスタート！');
$('startBtn').disabled = false;
</script>
</body>
</html>
